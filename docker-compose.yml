services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file: ./backend/.env
    environment:
      PORT: "4000"
      NODE_ENV: production

  admin:
    build:
      context: ./admin
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "80:80"
    depends_on:
      - backend
